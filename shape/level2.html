<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>LEVEL 2 かたちパズル - Hard Mode</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css">
    <style>
        .puzzle-area {
            background: white;
            width: 380px;
            height: 350px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #34495e;
            border-radius: 20px;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 320px;
            margin: 20px auto;
        }

        .choice-btn {
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            background: #fff;
            border: 3px solid #e67e22;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .choice-btn:hover {
            background: #fef5e7;
            transform: translateY(-2px);
        }

        .choice-btn.correct {
            background: #2ecc71;
            color: white;
            border-color: #27ae60;
        }

        .choice-btn.wrong {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        svg {
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <h1>LEVEL 2 <br>究極の かたち数えチャレンジ！</h1>

    <div id="question-text" class="target-display" style="font-size: 22px; color: #2c3e50; min-height: 50px;"></div>

    <div class="puzzle-area" id="puzzle-container"></div>

    <div class="choices-grid" id="choices"></div>

    <div id="message" class="message"></div>
    <button class="common-button" id="next-puzzle" onclick="loadNextPuzzle()" style="display:none;">Next
        Challenge</button>

    <div class="nav-buttons">
        <a href="level1.html" class="nav-button">🔙 Previous</a>
        <a href="../index.html" class="nav-button">🏠 HOME</a>
        <a href="level3.html" class="nav-button">🔜 Next Level</a>
    </div>

    <script>
        const puzzles = [
            {
                text: "しかく(Square) は ぜんぶで いくつ？",
                // Lưới 2x2: 4 nhỏ + 1 lớn = 5
                svg: `<svg width="200" height="200" viewBox="0 0 200 200">
                <rect x="10" y="10" width="180" height="180" fill="none" stroke="#2c3e50" stroke-width="5"/>
                <line x1="100" y1="10" x2="100" y2="190" stroke="#2c3e50" stroke-width="5"/>
                <line x1="10" y1="100" x2="190" y2="100" stroke="#2c3e50" stroke-width="5"/>
              </svg>`,
                options: [4, 5, 6, 8],
                answer: 5
            },
            {
                text: "さんかく(Triangle) は ぜんぶで いくつ？",
                // Tam giác lớn có 2 đường kẻ ngang chia làm 3 tầng (3 tam giác chồng nhau)
                svg: `<svg width="200" height="200" viewBox="0 0 200 200">
                <path d="M100 10 L10 180 L190 180 Z" fill="none" stroke="#e74c3c" stroke-width="5"/>
                <line x1="70" y1="67" x2="130" y2="67" stroke="#e74c3c" stroke-width="5"/>
                <line x1="40" y1="125" x2="160" y2="125" stroke="#e74c3c" stroke-width="5"/>
              </svg>`,
                options: [1, 2, 3, 5],
                answer: 3
            },
            {
                text: "しかく(Rectangle) は ぜんぶで いくつ？",
                // Hình chữ nhật chia 3 phần dọc: 3 nhỏ + 2 vừa + 1 lớn = 6
                svg: `<svg width="240" height="150" viewBox="0 0 240 150">
                <rect x="10" y="20" width="220" height="110" fill="none" stroke="#3498db" stroke-width="5"/>
                <line x1="83" y1="20" x2="83" y2="130" stroke="#3498db" stroke-width="5"/>
                <line x1="156" y1="20" x2="156" y2="130" stroke="#3498db" stroke-width="5"/>
              </svg>`,
                options: [3, 4, 5, 6],
                answer: 6
            }
        ];

        let currentIdx = 0;

        function loadPuzzle() {
            const p = puzzles[currentIdx];
            document.getElementById('question-text').textContent = p.text;
            document.getElementById('puzzle-container').innerHTML = p.svg;
            document.getElementById('message').textContent = '';
            document.getElementById('next-puzzle').style.display = 'none';

            const choicesEl = document.getElementById('choices');
            choicesEl.innerHTML = '';
            p.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                choicesEl.appendChild(btn);
            });
        }

        function checkAnswer(val, btn) {
            const correct = puzzles[currentIdx].answer;
            const msg = document.getElementById('message');

            if (val === correct) {
                btn.classList.add('correct');
                msg.textContent = "🎉 正解！(Excellent!)";
                msg.style.color = "green";
                document.getElementById('next-puzzle').style.display = 'inline-block';
                const allBtns = document.querySelectorAll('.choice-btn');
                allBtns.forEach(b => b.onclick = null);
            } else {
                btn.classList.add('wrong');
                msg.textContent = "❌ おしい！隠れている形も探してみて。";
                msg.style.color = "red";
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function loadNextPuzzle() {
            currentIdx = (currentIdx + 1) % puzzles.length;
            loadPuzzle();
        }

        loadPuzzle();
    </script>
</body>

</html>
